<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kontaktujte nás - Dalin">
    <title>Kontakt | Dalin</title>
    <link rel="stylesheet" href="/src/css/main.css">
    <script>
        (function() {
            const darkMode = localStorage.getItem('darkMode') === 'true';
            if (darkMode) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script type="module" src="/src/js/main.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' }" x-init="if (darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark')">
    
    <!-- SITE_NAV:kontakt -->

    <!-- Content -->
    <main class="py-12 px-4">
        <div class="container mx-auto max-w-2xl">
            <h1 class="text-4xl font-bold mb-6 text-brand dark:text-brand-foreground">Kontaktujte nás</h1>
            
            <div class="bg-gray-50 dark:bg-gray-800 p-8 rounded-lg shadow-md">
                <form action="/api/contact.php" method="POST" x-data="{ 
                    formData: {}, 
                    isSubmitting: false, 
                    showSuccess: false,
                    showError: false,
                    submitForm(event) {
                        event.preventDefault();
                        this.isSubmitting = true;
                        
                        fetch('/api/contact.php', {
                            method: 'POST',
                            body: new FormData(event.target)
                        })
                        .then(response => response.json())
                        .then(data => {
                            this.isSubmitting = false;
                            if (data.success) {
                                this.showSuccess = true;
                                event.target.reset();
                                setTimeout(() => this.showSuccess = false, 5000);
                            } else {
                                this.showError = true;
                                setTimeout(() => this.showError = false, 5000);
                            }
                        })
                        .catch(error => {
                            this.isSubmitting = false;
                            this.showError = true;
                            setTimeout(() => this.showError = false, 5000);
                        });
                    }
                }">
                    
                    <!-- Success Message -->
                    <div x-show="showSuccess" x-cloak
                         class="mb-4 p-4 bg-green-100 dark:bg-green-800 text-green-800 dark:text-green-200 rounded-lg">
                        Děkujeme! Vaše zpráva byla odeslána.
                    </div>
                    
                    <!-- Error Message -->
                    <div x-show="showError" x-cloak
                         class="mb-4 p-4 bg-red-100 dark:bg-red-800 text-red-800 dark:text-red-200 rounded-lg">
                        Omlouváme se, došlo k chybě. Zkuste to prosím znovu.
                    </div>
                    
                    <div class="mb-4">
                        <label for="name" class="block mb-2 font-semibold">Jméno *</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            required
                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-brand/60 focus:border-transparent dark:focus:ring-brand-foreground/50 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"
                        >
                    </div>
                    
                    <div class="mb-4">
                        <label for="email" class="block mb-2 font-semibold">Email *</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required
                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-brand/60 focus:border-transparent dark:focus:ring-brand-foreground/50 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"
                        >
                    </div>
                    
                    <div class="mb-4">
                        <label for="subject" class="block mb-2 font-semibold">Předmět *</label>
                        <input 
                            type="text" 
                            id="subject" 
                            name="subject" 
                            required
                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-brand/60 focus:border-transparent dark:focus:ring-brand-foreground/50 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"
                        >
                    </div>
                    
                    <div class="mb-6">
                        <label for="message" class="block mb-2 font-semibold">Zpráva *</label>
                        <textarea 
                            id="message" 
                            name="message" 
                            rows="5" 
                            required
                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-brand/60 focus:border-transparent dark:focus:ring-brand-foreground/50 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"
                        ></textarea>
                    </div>
                    
                    <button 
                        type="submit" 
                        x-bind:disabled="isSubmitting"
                        class="w-full px-6 py-3 bg-brand text-zinc-900 font-semibold rounded-lg hover:bg-brand/90 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand/70 focus-visible:ring-offset-2 dark:focus-visible:ring-brand-foreground/60 dark:focus-visible:ring-offset-gray-900 disabled:bg-gray-400 disabled:cursor-not-allowed disabled:text-gray-600"
                    >
                        <span x-show="!isSubmitting">Odeslat</span>
                        <span x-show="isSubmitting">Odesílání...</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- SITE_FOOTER -->

</body>
</html>
